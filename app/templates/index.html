<!DOCTYPE html>
<html>
<head>
    <title>House Price Predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #bcc2d1;
            color: white;
        }
        label {
            color: #e2e8f0;   /* light color */
            font-weight: 500;
        }
        input::placeholder {
            color: #94a3b8;  /* visible placeholder */
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card p-4 shadow-lg" style="background:#8da4ca; border-radius:15px;">
        
        <h2 class="text-center mb-4">🏠 House Price Prediction</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Area (sqft)</label>
                <input type="number" name="area" class="form-control" placeholder="Enter area (e.g. 1500)" required>
            </div>

            <div class="mb-3">
                <label>Bedrooms</label>
                <input type="number" name="bedrooms" class="form-control" placeholder="Enter bedrooms (e.g. 3)" required>
            </div>

            <div class="mb-3">
                <label>Bathrooms</label>
                <input type="number" name="bathrooms" class="form-control" placeholder="Enter bathrooms (e.g. 2)" required>
            </div>

            <button class="btn btn-primary w-100">Predict Price</button>
        </form>

        {% if prediction %}
        <div class="alert alert-success mt-4 text-center">
            💰 Predicted Price: ₹ {{ prediction }}
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
