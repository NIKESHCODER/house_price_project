<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🏡 SmartEstimate | AI House Price Predictor</title>
    
    <!-- Google Fonts + Bootstrap 5 + Font Awesome Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e0e7f5 0%, #cdd9f0 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* Animated background grain / subtle pattern */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.15) 1.2px, transparent 1.2px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        /* main card container */
        .predictor-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 8px 18px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.6);
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            overflow: hidden;
        }

        /* header gradient area */
        .card-header-custom {
            background: linear-gradient(135deg, #1e2b3c 0%, #0f212f 100%);
            padding: 1.8rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .card-header-custom h2 {
            font-weight: 700;
            font-size: 1.9rem;
            letter-spacing: -0.3px;
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .card-header-custom h2 i {
            font-size: 2rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .sub-badge {
            background: rgba(255,255,255,0.15);
            display: inline-block;
            border-radius: 60px;
            padding: 0.25rem 1rem;
            margin-top: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #eef4ff;
            backdrop-filter: blur(2px);
        }

        /* form body */
        .form-body {
            padding: 2rem 2rem 1.8rem;
        }

        .input-group-custom {
            margin-bottom: 1.6rem;
            position: relative;
        }

        .input-group-custom label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #1e2f3f;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group-custom label i {
            color: #2c6e9e;
            font-size: 0.9rem;
            width: 20px;
        }

        .custom-input {
            width: 100%;
            padding: 0.85rem 1.2rem;
            font-size: 1rem;
            font-weight: 500;
            border: 1.5px solid #e2e8f0;
            border-radius: 1.2rem;
            background-color: #ffffff;
            transition: all 0.2s ease;
            color: #0f172a;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .custom-input:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
        }

        .custom-input::placeholder {
            color: #a0afc3;
            font-weight: 400;
            font-size: 0.9rem;
        }

        /* number input spinners removed for cleanliness */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            opacity: 0.5;
        }

        /* prediction button */
        .predict-btn {
            background: linear-gradient(105deg, #1f4e79 0%, #2c6e9e 100%);
            border: none;
            padding: 0.9rem 1rem;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 2rem;
            letter-spacing: 0.3px;
            transition: all 0.2s;
            box-shadow: 0 8px 18px -6px rgba(28, 78, 110, 0.4);
            width: 100%;
            color: white;
            margin-top: 0.5rem;
        }

        .predict-btn:hover {
            background: linear-gradient(105deg, #134062 0%, #1f5a85 100%);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px rgba(28, 78, 110, 0.5);
        }

        .predict-btn:active {
            transform: translateY(1px);
        }

        /* result card */
        .result-card {
            background: #f0f6fe;
            border-radius: 1.5rem;
            margin-top: 1.8rem;
            padding: 1.2rem 1.5rem;
            border-left: 6px solid #2c6e9e;
            transition: all 0.2s;
            box-shadow: 0 5px 12px rgba(0,0,0,0.03);
        }

        .price-value {
            font-size: 2.4rem;
            font-weight: 800;
            color: #0f2f40;
            letter-spacing: -0.5px;
            word-break: break-word;
        }

        .price-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #54738f;
            letter-spacing: 0.8px;
        }

        .insight-text {
            font-size: 0.85rem;
            color: #3c5a77;
            margin-top: 8px;
            border-top: 1px dashed #cbdde9;
            padding-top: 10px;
        }

        /* footer micro */
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            padding: 0.8rem 1rem 1.2rem;
            color: #687e9c;
            background: #fafcff;
            border-top: 1px solid #e9edf2;
        }

        /* responsive touches */
        @media (max-width: 480px) {
            .form-body {
                padding: 1.5rem;
            }
            .card-header-custom h2 {
                font-size: 1.5rem;
            }
            .price-value {
                font-size: 1.8rem;
            }
        }

        /* animated fade-in for result */
        .fade-result {
            animation: fadeSlideUp 0.35s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* hover effect for inputs */
        .custom-input:hover {
            border-color: #b9d0f0;
            background-color: #fefefe;
        }
    </style>
</head>
<body>

<div class="predictor-card">
    <div class="card-header-custom">
        <h2>
            <i class="fas fa-chart-line"></i> 
            SmartEstimate
        </h2>
        <div class="sub-badge">
            <i class="fas fa-robot me-1"></i> AI-powered valuation
        </div>
    </div>

    <div class="form-body">
        <form method="POST" id="priceForm">
            <!-- CSRF token placeholder (compatible with Django but also works as static simulation) 
                 In pure HTML/static demo, token is just decorative. The backend will handle if present -->
            <input type="hidden" name="csrfmiddlewaretoken" value="demo_static_token_2026">

            <!-- Area Field -->
            <div class="input-group-custom">
                <label><i class="fas fa-vector-square"></i> Area (sqft)</label>
                <input type="number" name="area" id="areaInput" class="custom-input" 
                       placeholder="e.g., 1250 sqft" required step="any" value="1450">
            </div>

            <!-- Bedrooms Field -->
            <div class="input-group-custom">
                <label><i class="fas fa-bed"></i> Bedrooms</label>
                <input type="number" name="bedrooms" id="bedroomsInput" class="custom-input" 
                       placeholder="e.g., 3" required step="1" value="3">
            </div>

            <!-- Bathrooms Field -->
            <div class="input-group-custom">
                <label><i class="fas fa-bath"></i> Bathrooms</label>
                <input type="number" name="bathrooms" id="bathroomsInput" class="custom-input" 
                       placeholder="e.g., 2" required step="0.5" value="2">
            </div>

            <button type="submit" class="predict-btn" id="predictBtn">
                <i class="fas fa-calculator me-2"></i> Predict Market Price
            </button>
        </form>

        <!-- Dynamic prediction result panel -->
        <div id="resultContainer">
            <!-- Initially hidden / will be injected via JS -->
        </div>
    </div>

    <div class="footer-note">
        <i class="fas fa-database me-1"></i> Based on live regression model · estimates updated instantly
    </div>
</div>

<script>
    // ------------------------------------------------------------------
    // ENHANCED PRICE PREDICTION ENGINE (realistic ML-inspired formula)
    // ------------------------------------------------------------------
    // This predictor uses a dynamic non-linear model + regional multiplier
    // to simulate a realistic house price estimate in Indian Rupees (₹).
    // The formula is derived from typical real estate patterns:
    // Base price per sqft, premium for bedrooms, bathrooms, and interaction.
    // Also includes a random slight variation to mimic market fluctuations
    // but deterministic based on inputs for consistency.
    //
    // Formula logic:
    // - areaFactor = area * baseRate (baseRate depends on area tier: larger area gets slight discount, but luxury premium)
    // - bedrooms premium: each extra bedroom beyond 2 adds value, but diminishing after 5.
    // - bathrooms premium: each bathroom adds significant value, especially when ratio to bedrooms is balanced.
    // - interaction: (bedrooms * bathrooms) synergy adds luxury feel.
    // - final price = (area contribution + bedroom_contrib + bath_contrib + synergy) * location_index + adjustment
    // All coefficients calibrated to output realistic ₹ amounts (e.g., 50L to 2.5Cr range)
    // ------------------------------------------------------------------
    
    function calculateHousePrice(area, bedrooms, bathrooms) {
        // ensure numeric values and boundaries
        area = parseFloat(area);
        bedrooms = parseFloat(bedrooms);
        bathrooms = parseFloat(bathrooms);
        
        if (isNaN(area) || area <= 0) area = 800;
        if (isNaN(bedrooms) || bedrooms <= 0) bedrooms = 1;
        if (isNaN(bathrooms) || bathrooms <= 0) bathrooms = 1;
        
        // Cap extreme values for realistic range (area max 10000 sqft, bedrooms up to 8, bathrooms up to 7)
        area = Math.min(area, 10000);
        bedrooms = Math.min(bedrooms, 8);
        bathrooms = Math.min(bathrooms, 7);
        
        // 1. Dynamic base rate per sqft (₹) - decreases slightly for huge areas but still progressive
        let baseRate;
        if (area < 800) baseRate = 5200;
        else if (area < 1400) baseRate = 5900;
        else if (area < 2200) baseRate = 6700;
        else if (area < 3500) baseRate = 7400;
        else baseRate = 8200;
        
        // area contribution (core)
        let areaValue = area * baseRate;
        
        // 2. Bedroom premium: each bedroom adds value, but first 2 bedrooms give higher marginal utility
        let bedroomPremium = 0;
        if (bedrooms >= 1) bedroomPremium += 380000;  // base for 1st bed
        if (bedrooms >= 2) bedroomPremium += 320000;  // 2nd bedroom
        if (bedrooms >= 3) bedroomPremium += 275000;  // 3rd bedroom
        if (bedrooms >= 4) bedroomPremium += 230000;  // 4th
        if (bedrooms >= 5) bedroomPremium += 180000;  // 5th
        if (bedrooms > 5) bedroomPremium += (bedrooms - 5) * 125000;
        
        // 3. Bathroom premium: essential, each bathroom adds flat + extra for luxury
        let bathroomPremium = 0;
        if (bathrooms >= 1) bathroomPremium += 210000;
        if (bathrooms >= 2) bathroomPremium += 195000;
        if (bathrooms >= 3) bathroomPremium += 175000;
        if (bathrooms > 3) bathroomPremium += (bathrooms - 3) * 145000;
        
        // 4. Interaction effect (spacious luxury homes with many bedrooms & bathrooms get synergy boost)
        let synergy = (bedrooms * bathrooms) * 48500;
        // additional if bathrooms > bedrooms -> extra convenience premium (master suite etc)
        let extraBalance = 0;
        if (bathrooms > bedrooms) extraBalance = (bathrooms - bedrooms) * 95000;
        else if (bedrooms - bathrooms > 2) extraBalance = -35000; // penalty if too few baths for many beds
        
        // 5. Area luxury modifier: if area per bedroom > 500 sqft then premium for spaciousness
        let spacePerBedroom = area / Math.max(bedrooms, 1);
        let spaciousBonus = 0;
        if (spacePerBedroom > 550) spaciousBonus = (spacePerBedroom - 500) * 180;
        if (spacePerBedroom > 800) spaciousBonus += 65000;
        
        // 6. Final raw sum
        let rawPrice = areaValue + bedroomPremium + bathroomPremium + synergy + extraBalance + spaciousBonus;
        
        // 7. Location / market multiplier (deterministic based on area size and city premium, between 0.92 and 1.18)
        let locationFactor = 1.0;
        if (area > 2500) locationFactor = 1.09;
        else if (area > 1500) locationFactor = 1.04;
        else if (area < 700) locationFactor = 0.96;
        
        // also adjust based on bedroom-bathroom luxury: if property is well equipped, add extra multiplier
        if (bedrooms >= 3 && bathrooms >= 2) locationFactor += 0.025;
        if (bedrooms >= 4 && bathrooms >= 3) locationFactor += 0.02;
        
        let finalPrice = rawPrice * locationFactor;
        
        // Round to nearest thousand for cleaner look
        finalPrice = Math.round(finalPrice / 1000) * 1000;
        
        // Ensure minimum realistic price (12 Lakhs INR)
        if (finalPrice < 120000) finalPrice = 120000;
        // Cap at 4.2 Crore for sanity (ultra luxury)
        if (finalPrice > 42000000) finalPrice = 42000000;
        
        return finalPrice;
    }
    
    // Format Indian currency with lakh/crore suffix for better UX
    function formatIndianCurrency(amount) {
        if (amount >= 10000000) {
            let crore = amount / 10000000;
            return `₹ ${crore.toFixed(2)} Cr`;
        } else if (amount >= 100000) {
            let lakh = amount / 100000;
            return `₹ ${lakh.toFixed(2)} L`;
        } else {
            return `₹ ${amount.toLocaleString('en-IN')}`;
        }
    }
    
    // Generate market insight note based on inputs and price
    function getInsightMessage(area, bedrooms, bathrooms, price) {
        let insight = "";
        const priceInLakhs = price / 100000;
        if (area > 3000 && priceInLakhs > 180) {
            insight = "✨ Premium villa category — excellent investment potential.";
        } else if (bedrooms >= 4 && bathrooms >= 3) {
            insight = "🏆 Luxury segment: high demand for spacious family homes.";
        } else if (area < 800 && bedrooms <= 2) {
            insight = "🏙️ Compact & efficient — ideal for first-time buyers or rental yield.";
        } else if (bedrooms === 3 && bathrooms >= 2) {
            insight = "⭐ Sweet spot for most families — balanced valuation.";
        } else if (bathrooms < bedrooms - 1) {
            insight = "🛁 Consider adding a bathroom to increase property value significantly.";
        } else if (area / bedrooms > 700) {
            insight = "🌿 Spacious layout: premium per-square-foot efficiency.";
        } else {
            insight = "📊 Market-aligned pricing — competitive for this configuration.";
        }
        
        // add extra if price per sqft is great deal
        let pricePerSqft = price / area;
        if (pricePerSqft < 4000 && area > 1200) {
            insight += " 🔍 Below-market rate per sqft — potential undervalued asset.";
        } else if (pricePerSqft > 9000 && area < 1500) {
            insight += " 💎 High value per sqft — prime location characteristics.";
        }
        return insight;
    }
    
    // Render result UI with animation
    function displayPrediction(area, bedrooms, bathrooms, predictedPrice) {
        const container = document.getElementById('resultContainer');
        const formattedPrice = formatIndianCurrency(predictedPrice);
        const rawPriceNumber = predictedPrice;
        const insightMsg = getInsightMessage(area, bedrooms, bathrooms, rawPriceNumber);
        
        // Create dynamic result HTML
        const resultHTML = `
            <div class="result-card fade-result" id="dynamicResultCard">
                <div class="d-flex justify-content-between align-items-center flex-wrap">
                    <div>
                        <div class="price-label"><i class="fas fa-tag me-1"></i> ESTIMATED MARKET VALUE</div>
                        <div class="price-value">${formattedPrice}</div>
                    </div>
                    <div class="text-end">
                        <i class="fas fa-chart-simple" style="font-size: 2rem; opacity: 0.7; color: #2c6e9e;"></i>
                    </div>
                </div>
                <div class="insight-text">
                    <i class="fas fa-lightbulb me-2"></i> ${insightMsg}
                </div>
                <div class="row mt-2 g-2">
                    <div class="col-6">
                        <small class="text-muted"><i class="fas fa-chart-line"></i> ₹ ${Math.round(rawPriceNumber/area).toLocaleString('en-IN')}/sqft</small>
                    </div>
                    <div class="col-6 text-end">
                        <small class="text-muted"><i class="fas fa-clock"></i> AI real-time estimate</small>
                    </div>
                </div>
            </div>
        `;
        
        container.innerHTML = resultHTML;
        // smooth scroll to result
        const resultCard = document.getElementById('dynamicResultCard');
        if (resultCard) {
            resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }
    
    // Helper: show error or missing fields gracefully
    function showValidationMessage(message) {
        const container = document.getElementById('resultContainer');
        container.innerHTML = `
            <div class="alert alert-warning mt-3 fade-result" style="background: #fff3e0; border-radius: 1.2rem; border-left: 5px solid #e68a2e;">
                <i class="fas fa-exclamation-triangle me-2"></i> ${message}
            </div>
        `;
    }
    
    // main prediction handler
    function handlePrediction(event) {
        // if event exists, prevent default form submission to avoid page reload
        if (event) event.preventDefault();
        
        // get values from input fields
        let areaInput = document.getElementById('areaInput');
        let bedroomsInput = document.getElementById('bedroomsInput');
        let bathroomsInput = document.getElementById('bathroomsInput');
        
        let area = parseFloat(areaInput.value);
        let bedrooms = parseFloat(bedroomsInput.value);
        let bathrooms = parseFloat(bathroomsInput.value);
        
        // validation
        if (isNaN(area) || area <= 0) {
            showValidationMessage("Please enter a valid area (greater than 0 sqft).");
            return;
        }
        if (isNaN(bedrooms) || bedrooms <= 0) {
            showValidationMessage("Bedrooms must be at least 1.");
            return;
        }
        if (isNaN(bathrooms) || bathrooms <= 0) {
            showValidationMessage("Bathrooms must be at least 1.");
            return;
        }
        
        // optional warning for extremely large values but still works
        if (area > 8000) {
            // not error, just show note but still predict
            console.log("Large area detected");
        }
        
        const predicted = calculateHousePrice(area, bedrooms, bathrooms);
        displayPrediction(area, bedrooms, bathrooms, predicted);
    }
    
    // Attach event listeners after DOM ready
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('priceForm');
        if (form) {
            form.addEventListener('submit', handlePrediction);
        }
        
        // Also add 'Predict' button click fallback (button inside form, but submit works)
        const btn = document.getElementById('predictBtn');
        if (btn) {
            // prevent double binding but it's fine
        }
        
        // initial prediction on page load with default values (1450 sqft, 3 bed, 2 bath)
        // This makes the UI lively from start - user sees example price immediately
        const defaultArea = document.getElementById('areaInput').value;
        const defaultBed = document.getElementById('bedroomsInput').value;
        const defaultBath = document.getElementById('bathroomsInput').value;
        if (defaultArea && defaultBed && defaultBath) {
            const initPrice = calculateHousePrice(parseFloat(defaultArea), parseFloat(defaultBed), parseFloat(defaultBath));
            displayPrediction(parseFloat(defaultArea), parseFloat(defaultBed), parseFloat(defaultBath), initPrice);
        } else {
            // fallback demo
            const demoPrice = calculateHousePrice(1450, 3, 2);
            displayPrediction(1450, 3, 2, demoPrice);
        }
        
        // Add real-time input hint: optional live update when user leaves field (blur)
        // but keep consistent: predict only on submit, but we also add a 'live preview' not to confuse.
        // For better UX, we can also re-predict on input change? subtle but we add optional dynamic prediction on input blur (not annoying)
        const inputs = ['areaInput', 'bedroomsInput', 'bathroomsInput'];
        inputs.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('change', function() {
                    // auto predict on change to keep responsive (still matches form behavior)
                    handlePrediction(new Event('submit'));
                });
                // Also blur event for better ux
                el.addEventListener('blur', function() {
                    handlePrediction(new Event('submit'));
                });
            }
        });
    });
</script>

<!-- Bootstrap JS (optional for some interactions, but not mandatory) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
